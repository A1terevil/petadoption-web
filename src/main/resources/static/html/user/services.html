<script src="../../js/axios-0.18.0.js"></script>

<script>

    //隐藏元素
    function hidden() {
        document.getElementById("md-1").style.display = "none";
        document.getElementById("md-2").style.display = "none";
        document.getElementById("md-3").style.display = "none";

    }
    //显示某一页的数据
    function showByPage(page) {
        axios({
            method: "post",
            url: "http://localhost:8080/PetAMSystem/pet/selectByPage",
            data:page
        }).then(function (resp) {
            var pets = resp.data;
            pageData = pets;
            hidden();
            for (var i = 0; i < pets.length; i++) {
                document.getElementById("md-" + (i + 1) + "").style.display = "block";

                document.getElementById("img-" + (i + 1) + "").src = "../../images/animal/" + pets[i].pic;
                document.getElementById("p-" + (i + 1) + "").innerText = pets[i].petName;
                document.getElementById("span-" + (i + 1) + "").innerText = pets[i].remark;
            }
        })
    }

    //获取尾页数
    function getTail() {
        axios({
            method: "post",
            url: "http://localhost:8080/PetAMSystem/pet/selectAll"
        }).then(function (resp) {
            let pets = resp.data;
            //计算最后一页的页数
            tail = Math.ceil(pets.length / 3)
        })
    }

    //按钮的显示与隐藏
    function showAndHidden() {
        if (index == 1) {
            document.getElementById("home").style.display = "none";
            document.getElementById("upPage").style.display = "none";
            document.getElementById("downPage").style.display = "block";
            document.getElementById("tail").style.display = "block";
        } else if (index == tail) {
            document.getElementById("downPage").style.display = "none";
            document.getElementById("tail").style.display = "none";
            document.getElementById("home").style.display = "block";
            document.getElementById("upPage").style.display = "block";
        }else {
            document.getElementById("downPage").style.display = "block";
            document.getElementById("tail").style.display = "block";
            document.getElementById("home").style.display = "block";
            document.getElementById("upPage").style.display = "block";
        }
    }

    //记录页数
    var index = 1;
    showByPage(index);

    //记录尾页数
    var tail;
    getTail();

    //记录每页数据
    var pageData;

    //点击首页
    document.getElementById("home").onclick = function () {
        index = 1;
        document.getElementById("current").innerText = index;
        showByPage(index);
        showAndHidden();
    }
    //点击上一页
    document.getElementById("upPage").onclick = function () {
        index-=1;
        document.getElementById("current").innerText = index;
        showByPage(index);
        showAndHidden();
    }
    //点击下一页
    document.getElementById("downPage").onclick = function () {
        index+=1;
        document.getElementById("current").innerText = index;
        showByPage(index);
        showAndHidden();
    }
    //点击尾页
    document.getElementById("tail").onclick = function () {
        index = tail;
        document.getElementById("current").innerText = index;
        showByPage(index);
        showAndHidden();
    }

    //点击a跳转至领养页面
    document.getElementById("a-1").onclick = function () {
        location.href = "http://localhost:8080/PetAMSystem/static/html/user/show.html?pageData=" + encodeURIComponent(JSON.stringify(pageData[0]));
    }
    document.getElementById("a-2").onclick = function () {
        location.href = "http://localhost:8080/PetAMSystem/static/html/user/show.html?pageData=" + encodeURIComponent(JSON.stringify(pageData[1]));
    }
    document.getElementById("a-3").onclick = function () {
        location.href = "http://localhost:8080/PetAMSystem/static/html/user/show.html?pageData=" + encodeURIComponent(JSON.stringify(pageData[2]));
    }



</script>
