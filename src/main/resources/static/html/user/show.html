<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>动物的具体信息</title>

    <link rel="stylesheet" href="../../bootstrap/css/bootstrap.min.css">

    <link rel="stylesheet" href="../../css/user/show.css">
    <script src="../../js/user/jquery-2.2.3.min.js"></script>
    <script src="../../bootstrap/js/bootstrap.js"></script>
    <script src="../../js/user/jquery.slideBox.min.js" type="text/javascript"></script>
    <!--    <script src="../../js/user/jquery.comment.js"></script>-->
	<style>
		ul
		{
			list-style-type:none;
			margin:0;
			padding:0;
			overflow:hidden;
		}
		li
		{
			float:left;
		}
		
		
	</style>
	
</head>
<body>
<div class="nav-links">
    <nav class='navbar navbar-default'>
        <div class='container'>
            <div class='collapse navbar-collapse'>
                <ul class="nav navbar-nav">
                    <li>
                        <input type="button" class="btn btn-default" id="show_back" value="返回主页">
                    </li>
                    <li>
                        <button class="btn btn-primary btn-lg" id="register-login" data-toggle="modal" data-target="#login" style="display: block">预约登记</button>
                    </li>
                    <li>
                        <button class="btn btn-primary btn-lg" id="modify" data-toggle="modal" data-target="#editUsers" style="display: block">取消预约</button>
                    </li>
                </ul>
                <ul class="nav navbar-nav navbar-right">
                    <li>
                        <span id="title" style="font-size: 30px; font-weight: bold; color: #ac2925;">宠物信息</span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>
                    <!-- /.panel-heading -->
                    <table class="table table-bordered table-striped" style="background-color: beige;">
                        <thead>
                        <tr>
							<th>照片</th>
                            <th>编号</th>
                            <th>用户编号</th>
                            <th>宠物编号</th>
                            <th>宠物名</th>
                            <th>申请时间</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="tbody">
						
                        </tbody>
                    </table>
</div>


<!-- 注册登录模块框 -->
<div class="modal fade" id="login" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
                <h4 class="modal-title" id="myModalLabel">
                    <div role="tabpanel">
                        <!-- Nav tabs -->
                        <ul class="nav nav-tabs" role="tablist">
                            <li role="presentation">
                                <a href="#tab" aria-controls="register" role="tab" data-toggle="tab">用户预约登记</a>
                            </li>
                        </ul>
                    </div>
                </h4>
            </div>
               
				<div role="tabpanel" class="tab-pane" id="tab">
                    <div class="modal-body">
                      <form class="form-horizontal" id="register_user_form" method="post" action="">
						  <div class="form-group">
						      <label for="register_telephone" class="col-sm-2 control-label">照片</label>
						      <div class="col-sm-8">
						          <input type="file" id="fileInput" />
						          <span id="tel_hint" class="err_msg" style="color: #ac2925"></span>
						      </div>
						  </div>
                            <div class="form-group">
                                <label for="register_realName" class="col-sm-2 control-label">姓名</label>
                                <div class="col-sm-8">
                                    <input type="text"
                                           class="form-control" id="register_realName" placeholder="姓名"
                                           name="realName">
                                    <span id="name_hint" class="err_msg" style="color: #ac2925"></span>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="register_telephone" class="col-sm-2 control-label">电话</label>
                                <div class="col-sm-8">
                                    <input  type="text" class="form-control" id="register_telephone"
                                           placeholder="电话"
                                           name="telephone">
                                    <span id="tel_hint" class="err_msg" style="color: #ac2925"></span>
                                </div>
                            </div>
							<div class="form-group">
							    <label for="register_date" class="col-sm-2 control-label">预计到达日期</label>
							    <div class="col-sm-8">
							        <input  type="date" class="form-control" id="register_date"
							               placeholder="日期"
							               name="date">
							        <span id="datel_hint" class="err_msg" style="color: #ac2925"></span>
							    </div>
							</div>
                            <input type="submit" value="" id="doRegister" style="display: none">
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class=" btn-default" data-dismiss="modal">关闭</button>
                       <button type="button" class=" btn-primary" id="btn-register">预约</button>
					   </form>
                    </div>
                </div>
            </div>
        </div><!-- /.modal-content -->
    </div><!-- /.modal -->
</div>


<div class="modal fade" id="editUsers" tabindex="-1" role="dialog" aria-labelledby="myModalLabe">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">×</span>
                </button>
                <h4 class="modal-title" id="myModalLabe">取消预约</h4>
            </div>
            <div class="modal-body">
                <form class="form-horizontal" id="edit_admin_form">
                    <input type="hidden" id="edit_id" name="id">
                    <div class="form-group">
                        <label for="del_userName" class="col-sm-2 control-label">
                            姓名
                        </label>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" id="del_userName" placeholder="姓名" name="userName">
                        </div>
                        <label for="del_Tel" class="col-sm-2 control-label">
                            手机号
                        </label>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" id="del_Tel" placeholder="手机号"
                                   name="userTel">
                        </div>
                    </div>
            <div class="modal-footer">
                <button id="updateClose" type="button" class=" btn-default" data-dismiss="modal">关闭</button>
                <button type="button" class=" btn-primary" id="btn_cancel">取消预约</button>
            </div>
        </div>
    </div>
</div>



<script src="../../js/axios-0.18.0.js"></script>

<script>
	$(document).ready(function(){
		$("#show_back").click(function(){
			location.href="../../../index.html";
		});
	});
</script>
</body>
</html>
