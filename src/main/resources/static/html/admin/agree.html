<script>
    let parent = document.getElementById("tbody");

    selectAgree();
    // 查询领养审核信息
    function selectAgree() {
        //1.
        axios({
            method: "get",
            url: "http://localhost:8080/PetAMSystem/adopt/selectAgree"
        }).then(function (resp) {
            let agrees = resp.data;
            if (agrees.length == 0) {
                alert("无同意记录");
                return;
            }
            for (let i = 0; i < agrees.length; i++) {
                parent.innerHTML += "  <tr id=\"tr-temp\">\n" +
                    "                            <td>"+(i+1)+"</td>\n" +
                    "                            <td>"+agrees[i].petId+"</td>\n" +
                    "                            <td>"+agrees[i].userId+"</td>\n" +
                    "                            <td>"+agrees[i].petName+"</td>\n" +
                    "                            <td>"+agrees[i].adoptTime+"</td>\n" +
                    "                        </tr>"
            }
        })
    }
</script>
