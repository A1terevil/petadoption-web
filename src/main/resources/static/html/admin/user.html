    ];
	
    var pageSize = 2; // 每页显示的条目数
    var pageCount = Math.ceil(data.length / pageSize); // 总页数
    var currentPage = 1;

    function renderTable(page) {
        var start = (page - 1) * pageSize;
        var end = start + pageSize;
        var partData = data.slice(start, end);
        var html = "";
        partData.forEach(function(item) {
            html += "<tr><td>" + item.code + "</td><td>"+ item.user_code + "</td><td>" + item.user_name + "</td><td>" + item.sex + "</td><td>" + item.age + "</td><td>"+item.Tel+ "</td><td>"+item.Addr+"</td><td>"+item.Ado+"</td><td>"+item.Time+"</td></tr>";
        });
        $("#tbody").html(html);
    }

    function renderPagination() {
        var html = '<li class="page-item ' + (currentPage == 1 ? 'disabled' : '') + '"><a class="page-link" href="#" aria-label="Previous"><span aria-hidden="true">«</span></a></li>';
        for (var i = 1; i <= pageCount; i++) {
            html += '<li class="page-item ' + (i == currentPage ? 'active' : '') + '"><a class="page-link" href="#">' + i + '</a></li>';
        }
        html += '<li class="page-item ' + (currentPage == pageCount ? 'disabled' : '') + '"><a class="page-link" href="#" aria-label="Next"><span aria-hidden="true">»</span></a></li>';
        $(".pagination").html(html);
    }

    $(document).on('click', '.pagination a', function(e) {
        e.preventDefault();
        var index = $(this).text();// 获取链接中的文本，即页码
        if (index === "»") {
            if (currentPage < pageCount) currentPage++;
        } else if (index === "«") {
            if (currentPage > 1) currentPage--;
        } else {
            currentPage = parseInt(index);
        }
        renderTable(currentPage);
        renderPagination();
    });

    renderTable(currentPage);
