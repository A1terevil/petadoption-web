<!-- 编写js代码 -->
<script>
    let parent = document.getElementById("tbody");

    // 查询领养审核信息
    function selectAll() {
        //1.
        var formData = {
            realName: "",
            telephone: ""
        }
        formData.realName = document.getElementById("fingByName").value;
        formData.telephone = document.getElementById("fingByTel").value;
        if (formData.realName == "" || formData.telephone == "") {
            alert("请输入用户姓名和电话");
            return;
        }
        //2.
        axios({
            method: "post",
            url: "http://localhost:8080/PetAMSystem/adopt/selectAllByRealNameAndTelephone",
            data: formData
        }).then(function (resp) {
            parent.innerHTML = "";
            let adopts = resp.data;
            if (adopts.length == 0) {
                alert("用户不存在");
                return;
            }
            for (let i = 0; i < adopts.length; i++) {
                //记录文本内容
                var text;
                if(adopts[i].state == 0){
                    text = "不同意";
                } else if(adopts[i].state == 1){
                    text = "还在审核";
                }else {
                    text = "同意";
                }

                //状态为1，显示同意不同意按钮
                if(adopts[i].state != 1){
                    parent.innerHTML += "               <tr id=\"tr-temp\">\n" +
                        "                            <td>"+(i+1)+"</td>\n" +
                        "                            <td>"+adopts[i].userId+"</td>\n" +
                        "                            <td>"+adopts[i].petId+"</td>\n" +
                        "                            <td>"+adopts[i].petName+"</td>\n" +
                        "                            <td>"+adopts[i].adoptTime+"</td>\n" +
                        "                            <td>"+text+"</td>\n" +
                        "                            <td>\n" +
                        "                            </td>\n" +
                        "                        </tr>"
                    // continue;
                }else{
                    parent.innerHTML += "               <tr id=\"tr-temp\">\n" +
                        "                            <td>"+(i+1)+"</td>\n" +
                        "                            <td>"+adopts[i].userId+"</td>\n" +
                        "                            <td>"+adopts[i].petId+"</td>\n" +
                        "                            <td>"+adopts[i].petName+"</td>\n" +
                        "                            <td>"+adopts[i].adoptTime+"</td>\n" +
                        "                            <td>"+text+"</td>\n" +
                        "                            <td>\n" +
                        "                                <button id=\"agree\" class=\"btn btn-danger btn-xs\" onclick=\"agree("+adopts[i].petId+")\">同意</button>\n" +
                        "                                <button id=\"disagree\" class=\"btn btn-danger btn-xs\" onclick=\"disagree("+adopts[i].petId+")\">不同意</button>\n" +
                        "                            </td>\n" +
                        "                        </tr>"
                }

            }

        })
    }

    // 同意
    function agree(petId) {
        //修改申请表和宠物表相应的状态
        axios({
            method: "get",
            url: "http://localhost:8080/PetAMSystem/adopt/agree?petId=" + petId
        }).then(function (resp) {
            document.getElementById("select").click();
        })
        axios({
            method: "get",
            url: "http://localhost:8080/PetAMSystem/pet/adopt?petId=" + petId
        })
    };
    // 不同意
    function disagree(petId) {
        //修改申请表和宠物表相应的状态
        axios({
            method: "get",
            url: "http://localhost:8080/PetAMSystem/adopt/disagree?petId=" + petId
        }).then(function (resp) {
            document.getElementById("select").click();
        })

        axios({
            method: "get",
            url: "http://localhost:8080/PetAMSystem/pet/notAdopt?petId=" + petId
        })
    };
</script>
