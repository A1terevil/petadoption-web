<!-- 编写js代码 -->
<script>
    let parent = document.getElementById("tbody");

    // 查询领养审核信息
    function selectComment() {
        //1.
        let realName = document.getElementById("findByRealName").value;
        if (realName == "") {
            alert("请输入用户姓名");
            return;
        }
        //2.
        axios({
            method: "get",
            url: "http://localhost:8080/PetAMSystem/comment/selectComment?realName=" + realName
        }).then(function (resp) {
            parent.innerHTML = "";
            let comments = resp.data;
            if (comments.length == 0) {
                alert("此用户没有评论");
                return;
            }
            for (let i = 0; i < comments.length; i++) {
                parent.innerHTML += "                        <tr id=\"tr-temp\">\n" +
                    "                            <td>" + (i + 1) + "</td>\n" +
                    "                            <td>" + comments[i].userId + "</td>\n" +
                    "                            <td>" + comments[i].content + "</td>\n" +
                    "                            <td>" + comments[i].commentTime + "</td>\n" +
                    "                            <td>" + comments[i].petId + "</td>\n" +
                    "                            <td>\n" +
                    "                                <a class=\"btn btn-danger btn-xs\" onclick=\"Delete("+comments[i].id+")\">删除</a>\n" +
                    "                            </td>\n" +
                    "                        </tr>";

            }
        })
    }

    // 删除
    function Delete(id) {
        axios({
            method: "get",
            url: "http://localhost:8080/PetAMSystem/comment/deleteById?id=" + id
        }).then(function (resp) {
            document.getElementById("select").click();
        })
    }
</script>
