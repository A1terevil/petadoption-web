<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>宠物信息管理</title>
    <!-- 引入css样式文件 -->
    <!-- Bootstrap Core CSS -->
    <link href="/static/css/admin/bootstrap.min.css" rel="stylesheet">
    <!-- MetisMenu CSS -->
    <link href="/static/css/admin/metisMenu.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="/static/css/admin/dataTables.bootstrap.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/static/css/admin/sb-admin-2.css" rel="stylesheet">
    <!-- Custom Fonts -->
    <link href="/static/css/admin/font-awesome.min.css" rel="stylesheet" type="text/css">
    <link href="/static/css/admin/boot-crm.css" rel="stylesheet" type="text/css">
    <style>
        .panel-heading {
            background-color: #337ab7;
            border-color: #2e6da4;
            font-size: 14px;
            padding-left: 20px;
            height: 36px;
            line-height: 36px;
            color: white;
            position: relative;
            cursor: pointer;
        }

        /*转成手形图标*/
        .panel-heading span {
            position: absolute;
            right: 10px;
            top: 12px;
        }
    </style>
</head>
<body>
<div id="wrapper">
    <!-- 导航栏部分 -->
    <nav class="navbar navbar-default navbar-static-top" role="navigation" style="margin-bottom: 0">
        <div class="navbar-header">
            <a class="navbar-brand" href="">宠物领养管理系统</a>
        </div>
        <!-- 导航栏右侧图标部分 -->
        <!-- 导航栏右侧图标部分 -->
        <ul class="nav navbar-top-links navbar-right">
            <!-- 消息通知 end -->
            <!-- 用户信息和系统设置 start -->
            <li class="dropdown">
                <a class="dropdown-toggle" data-toggle="dropdown" href="crmclass/list.action#">
                    <i class="fa fa-user fa-fw"></i>
                    <i class="fa fa-caret-down"></i>
                </a>
                <ul class="dropdown-menu dropdown-user">
                    <li>
                        <a th:href="@{/index}">
                            <i class="fa fa-sign-out fa-fw"></i>退出登录
                        </a>
                    </li>
                </ul>
            </li>
            <!-- 用户信息和系统设置结束 -->
        </ul> <!-- 左侧显示列表部分 start-->
        <div class="navbar-default sidebar" role="navigation">
            <div class="sidebar-nav navbar-collapse">
                <!-- 教学管理  折叠的分组列表 -->
                <div class="panel-heading" id="collapseListGroupHeading3" data-toggle="collapse"
                     data-target="#collapseListGroup3" role="tab">
                    <h4 class="panel-title">
                        后台管理 <span class="fa fa-chevron-up right"></span>
                    </h4>
                </div>
                <div id="collapseListGroup3" class="panel-collapse collapse in" role="tabpanel"
                     aria-labelledby="collapseListGroupHeading3">
                    <ul class="list-group">
                        <li class="list-group-item my_font">
                            <a th:href='@{/user/client}'>
                                <i class="fa fa-flash fa-fw"></i> 用户信息
                            </a>
                        </li>
                        <li class="list-group-item my_font">
                            <a th:href='@{/user/pet}'>
                                <i class="fa fa-sitemap fa-fw"></i> 宠物管理
                            </a>
                        </li>
						<li class="list-group-item my_font">
						    <a th:href='@{/user/admin_control}'>
						        <i class="fa fa-flash fa-fw"></i> 工作人员管理
						    </a>
						</li>
                    </ul>
                </div>

            </div>
        </div><!-- 左侧显示列表部分 end-->

    </nav>
    <!-- pet信息查询部分  start-->
    <div id="page-wrapper">
        <div class="row">
            <div class="col-lg-12">
                <h1 class="page-header">宠物信息管理</h1>
            </div>
            <!-- /.col-lg-12 -->
        </div>
        
        
        <!-- /.row -->
        <div class="panel panel-default">
            <!-- 搜索部分 -->
            <div class="panel-body">
                <form class="form-inline" method="post" action="pquery" th:object="${pet}">
                    <div class="form-group">
                        <label for="findByName">宠物名</label>
                        <input type="text" class="form-control" id="findByName" placeholder="宠物名" name="pname">
                    </div>
                    <input  type="submit" class="btn btn-primary form-control" id="pet_select" value="查询">
                </form>
            </div>
        </div>
        
        
        
        
        <a href="crmclass/list.action#" class="btn btn-primary" data-toggle="modal" data-target="#newPet"
        >新建</a>
        <div class="row">
            <div class="col-lg-12">
                <div class="panel panel-default" id="over_table">
                    <div class="panel-heading">宠物信息列表</div>
                    <!-- /.panel-heading -->
                    <table class="table table-bordered table-striped" id="pet_table">
                        <thead>
						    <tr>
						        <th>序号</th>
						        <th>名字</th>
						        <th>物种</th>
						        <th>性别</th>
						        <th>生日</th>
						        <th>领养状态</th>
						        <th>图片URL</th>
						        <th>操作</th>
						    </tr>
                        </thead>
                        <tbody id="parent">
 					        <tr th:each="pet,status: ${list}">
						        <td th:text="${pet.pid}">1</td>
						        <td th:text="${pet.pname}">1</td>
						        <td th:text="${pet.species}">1</td>
						        
						        <td th:if='${pet.psex}==M'>雄性</td>
						        <td th:unless="${pet.psex}==M">雌性</td>
						        
						        <td th:text="${pet.birthday}">1</td>
						        <td th:text="${pet.condition}">1</td>
						        <td th:text="${pet.image}">1</td>
					 	        <td>
					      	      								    
									<a href="crmclass/list.action#" class="btn btn-primary editBtn" data-toggle="modal" data-target="#editPet"
									th:attr="data-pid=${pet.pid}, data-pname=${pet.pname}, data-species=${pet.species},data-psex=${pet.psex},data-birthday=${pet.birthday},data-condition=${pet.condition},data-image=${pet.image}">修改</a>
									<a th:href="@{/pet/pdelete(pid=${pet.pid})}" th:onclick="'return confirm(\'Are you sure you want to delete this item?\');'"  >删除</a> 
					     			</td> 
						    </tr>                                         
                        </tbody>
                    </table>
<!--                     <div class="col-md-12 text-right">
                        <nav aria-label="Page navigation example">
                        <ul class="pagination">
                        </ul>
                        </nav>
                    </div>  -->
                </div>
            </div>

        </div>
        
        
    </div>
    <!-- 班级列表查询部分  end-->
</div>




<!-- 创建宠物模态框 -->
<div class="modal fade" id="newPet" tabindex="-1" role="dialog" aria-labelledby="myModalLabel">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">×</span>
                </button>
                <h4 class="modal-title" id="myModalLabel">新建宠物信息</h4>
            </div>
                                  
                        
            <div class="modal-body">
                <form class="form-horizontal" id="new_pet_form" action="pet/pdo-add" method="post" th:object="${pet}">
                    <div class="form-group">                       
                        <label for="new_petName" class="col-sm-2 control-label" id="pet">
                            宠物名
                        </label>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" id="new_petName" placeholder="宠物名"
                                   name="pname">
                        </div>
                        <label for="new_species" class="col-sm-2 control-label">
                            物种
                        </label>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" id="new_species" placeholder="物种"
                                   name="species">
                        </div>                        
                    </div>
                    
                    
                                        
                    <div class="form-group">                                              
                        <label for="new_sex" class="col-sm-2 control-label">
                            性别
                        </label>
                        <div class="col-sm-4">
                            <select class="form-control" id="new_sex" name="psex">
                                <option id="x" th:value="M">雄性</option>
                                <option id="c" th:value="F">雌性</option>
                            </select>
                        </div>
                        <label for="new_birthday" class="col-sm-2 control-label">
                            生日
                        </label>
                        <div class="col-sm-4">
                            <input type="date" class="form-control" id="new_birthday" placeholder="生日"
                                   name="birthday">
                        </div>
                    </div>
                    
                    
                    <div class="form-group">                                                                                                        
                        <label for="new_image" class="col-sm-2 control-label">
                            图片
                        </label>
                        <div class="col-sm-4">
							<input type="file" class="form-control" id="new_image" name="image">
                        </div> 
                        
                        <label for="new_state" class="col-sm-2 control-label">
                            领养状态
                        </label>
                        <div class="col-sm-4">
                            <select class="form-control" id="new_state" name="condition">
                                <option id="0" th:value="未被领养">未被领养</option>
                                <option id="2" th:value="待领养">待领养</option>
                            </select>
                        </div>                       
                    </div>                                       
                    
                    
                    <div class="form-group">
                    	<div class="col-sm-4 col-sm-offset-8">
		                	<button id="close" type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
		                	<input type="submit" class="btn btn-primary" value="创建宠物" id="creat_pet">
		                </div>
		            </div>
                </form>
            </div>       
        </div>
    </div>
</div>





<!-- 修改宠物模态框 -->
<div class="modal fade" id="editPet" tabindex="-1" role="dialog" aria-labelledby="myModalLabe">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">×</span>
                </button>
                <h4 class="modal-title" id="myModalLabe">修改宠物信息</h4>
            </div>
            <div class="modal-body">
                <form class="form-horizontal" id="edit_pet_form" action="pet/pupdate" method="post" th:object="${pet}">
                    <input type="hidden" id="edit_pid" name="pid" th:value="${pid}">
                    <div class="form-group">
                        <label for="edit_petName" class="col-sm-2 control-label">
                            宠物名
                        </label>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" id="edit_pname" placeholder="宠物名"
                                   name="pname" th:value="${pname}">
                        </div>
                        <label for="edit_species" class="col-sm-2 control-label">
                            宠物类型
                        </label>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" id="edit_species" placeholder="宠物类型"
                                   name="species" th:value="${species}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="edit_sex" class="col-sm-2 control-label">
                            性别
                        </label>
                        <div class="col-sm-4">
                            <select class="form-control" id="edit_sex" name="psex">
                                <option th:value="M">雄性</option>
                                <option th:value="F">雌性</option>
                            </select>
                        </div>
                        <label for="edit_birthday" class="col-sm-2 control-label">
                            生日
                        </label>
                        <div class="col-sm-4">
                            <input type="date" class="form-control" id="edit_birthday" placeholder="生日"
                                   name="birthday" th:value="${birthday}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="edit_state" class="col-sm-2 control-label">
                            领养状态
                        </label>
                        <div class="col-sm-4">
                            <select class="form-control" id="edit_state" name="condition">
                                <option th:value="未被领养">未被领养</option>
                                <option th:value="待领养">待领养</option>
                            </select>
                        </div>
                        
                         <label for="edit_image" class="col-sm-2 control-label">
                            照片
                        </label>
                        <div class="col-sm-4">
                            <input type="file" value="上传照片" id="edit_iamge" name="image">
                        </div>
                    </div>


                    
                    <div class="form-group">
                    	<div class="col-sm-4 col-sm-offset-8">
                			<button id="update-close" type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                			<button id="update" type="submit" class="btn btn-primary">保存修改</button>
            			</div>
            		</div>
                    
                    
                </form>
            </div>
            
        </div>
    </div>
</div>
<!-- 引入js文件 -->
<!-- jQuery -->
<script src="/static/js/user/jquery-2.2.3.min.js"></script>
<!-- Bootstrap Core JavaScript -->
<script src="/static/js/admin/bootstrap.min.js"></script>

<script src="/static/js/admin/metisMenu.min.js"></script>

<script src="/static/js/admin/jquery.dataTables.min.js"></script>
<script src="/static/js/admin/dataTables.bootstrap.min.js"></script>

<script src="/static/js/admin/sb-admin-2.js"></script>
<script src="/static/js/admin/admin.js"></script>

</html>
