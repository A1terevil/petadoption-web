<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>宠物具体信息</title>

    <link rel="stylesheet" href="/static/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/user/show.css">
    <script src="/static/js/user/jquery-2.2.3.min.js"></script>
    <script src="/static/bootstrap/js/bootstrap.js"></script>
    <script src="/static/js/user/jquery.slideBox.min.js" type="text/javascript"></script>
	<style>
		ul
		{
			list-style-type:none;
			margin:0;
			padding:0;
			overflow:hidden;
		}
		li
		{
			float:left;
		}
		
		
	</style>
	
</head>
<body>
<div class="nav-links">
    <nav class='navbar navbar-default'>
        <div class='container'>
            <div class='collapse navbar-collapse'>
                <ul class="nav navbar-nav">
                    <li>
                        <input type="button" class="btn btn-default" id="show_back" value="返回主页">
                    </li>
                    <li>
                        <button class="btn btn-primary btn-lg" id="register-login" data-toggle="modal" data-target="#login" style="display: block">预约登记</button>
                    </li>
                    <li>
                        <button class="btn btn-primary btn-lg" id="modify" data-toggle="modal" data-target="#editUsers" style="display: block">取消预约</button>
                    </li>
                </ul>
                <ul class="nav navbar-nav navbar-right">
                    <li>
                        <span id="title" style="font-size: 30px; font-weight: bold; color: #ac2925;">宠物信息</span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>



        <div class="row">
            <div class="col-lg-12">
                <div class="panel panel-default">
                    <div class="panel-heading">宠物信息列表</div>
                    <!-- /.panel-heading -->
                    <table class="table table-bordered table-striped" style="background-color: beige;">
                        <thead>
						    <tr>
 						    	<th>照片</th> 
						        <th>序号</th>
						        <th>名字</th>
						        <th>物种</th>
						        <th>性别</th>
						        <th>生日</th>
						        <th>领养状态</th>
						    </tr>
                        </thead>
                        <tbody id="parent">
					        <tr th:each="pet,status: ${list}">
					            <td>
					             <img th:src="@{/static/images/animal/{filename}(filename=${pet.image})}" class="img-fluid rounded" th:alt="${pet.image}" width="100px" height="100px">
					             </td>
						        <td th:text="${pet.pid}">1</td>
						        <td th:text="${pet.pname}">1</td>
						        <td th:text="${pet.species}">1</td>
						        
						        <td th:if='${pet.psex}==M'>雄性</td>
						        <td th:unless="${pet.psex}==M">雌性</td>
						        
						        <td th:text="${pet.birthday}">1</td>
						        <td th:text="${pet.condition}">1</td>
						    </tr>                     
                        </tbody>
                    </table>
<!-- 					<div class="col-md-12 text-right">
					      <nav aria-label="Page navigation example">
					             <ul class="pagination">
					                 分页按钮将通过jQuery动态生成
					             </ul>
					 </div> -->
                    <!-- /.panel-body -->
                </div>
                <!-- /.panel -->
            </div>
            <!-- /.col-lg-12 -->
        </div>



<!-- 预约模块框 -->
<div class="modal fade" id="login" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
                <h4 class="modal-title" id="myModalLabel">
                    <div role="tabpanel">
                        <!-- Nav tabs -->
                        <ul class="nav nav-tabs" role="tablist">
                            <li role="presentation">
                                <a href="#tab" aria-controls="register" role="tab" data-toggle="tab">用户预约登记</a>
                            </li>
                        </ul>
                    </div>
                </h4>
            </div>
               
				<div role="tabpanel" class="tab-pane" id="tab">
                    <div class="modal-body">
                      <form class="form-horizontal" id="register_user_form" method="post" action="show/cdo-add" th:object="${cli}">
                            <div class="form-group">                              
                                <label for="register_cname" class="col-sm-2 control-label">姓名</label>
                                <div class="col-sm-4">
                                    <input type="text"
                                           class="form-control" id="register_cname" placeholder="姓名"
                                           name="cname">
                                    <span id="cname_hint" class="err_msg" style="color: #ac2925"></span>
                                </div>
                                <label for="register_csex" class="col-sm-2 control-label">性别</label>
                                <div class="col-sm-4">
                                    <select class="form-control" id="register_csex" name="csex">
                                		<option id="x" th:value="M">男</option>
                                		<option id="c" th:value="F">女</option>
                            		</select>
                                    <span id="csex_hint" class="err_msg" style="color: #ac2925"></span>
                                </div>
                            </div>
            
                            
                            <div class="form-group">                                                               
                                <label for="register_cage" class="col-sm-2 control-label">年龄</label>
                                <div class="col-sm-4">
                                    <input type="text"
                                           class="form-control" id="register_cage" placeholder="年龄"
                                           name="cage">
                                    <span id="cname_hint" class="err_msg" style="color: #ac2925"></span>
                                </div>
                                <label for="register_tel" class="col-sm-2 control-label">电话</label>
                                <div class="col-sm-4">
                                    <input  type="text" class="form-control" id="register_tel"
                                           placeholder="电话"
                                           name="tel">
                                    <span id="tel_hint" class="err_msg" style="color: #ac2925"></span>
                                </div>
                            </div>
                            
                                                        
                            <div class="form-group">                                                                
                                <label for="register_addr" class="col-sm-2 control-label">地址</label>
                                <div class="col-sm-4">
                                    <input  type="text" class="form-control" id="register_addr"
                                           placeholder="地址"
                                           name="addr">
                                    <span id="addr_hint" class="err_msg" style="color: #ac2925"></span>
                            	</div>
                            	<label for="register_exp" class="col-sm-2 control-label">是否有领养经验</label>
                                <div class="col-sm-4">
                                    <select class="form-control" id="register_exp" name="exp">
                                		<option th:value="是">是</option>
                                		<option th:value="否">否</option>
                            		</select>
                                    <span id="exp_hint" class="err_msg" style="color: #ac2925"></span>
                                </div>
                            </div>
                            
                            
							<div class="form-group">																						
							    <label for="register_artime" class="col-sm-2 control-label">预计到达日期</label>
							    <div class="col-sm-4">
							        <input  type="date" class="form-control" id="register_artime"
							               placeholder="日期"
							               name="artime">
							        <span id="artime_hint" class="err_msg" style="color: #ac2925"></span>
							    </div>
							</div>
							
 							<div class="form-group">
                    			<div class="col-sm-4 col-sm-offset-8">
                					<button id="update-close" type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                					<button id="update" type="submit" class="btn btn-primary" onclick="alert('预约成功!')">预约</button>
            					</div>
            				</div> 

                        </form>
                    </div>			   
                    </div>
                </div>
            </div><!-- /.modal-content -->
        </div><!-- /.modal -->



<div class="modal fade" id="editUsers" tabindex="-1" role="dialog" aria-labelledby="myModalLabe">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">×</span>
                </button>
                <h4 class="modal-title" id="myModalLabe">取消预约</h4>
            </div>
            <div class="modal-body">
                <form class="form-horizontal" id="edit_admin_form" method="post" action="show/cdelete" th:object="${cli}">
                    <input type="hidden" id="edit_cid" name="cid">
                    <div class="form-group">
                        <label for="del_cname" class="col-sm-2 control-label">
                            姓名
                        </label>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" id="cname" placeholder="姓名" name="cname">
                        </div>
                        <label for="del_tel" class="col-sm-2 control-label">
                            电话
                        </label>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" id="del_tel" placeholder="电话"
                                   name="tel">
                        </div>
                    </div>
                    <div class="form-group">
                    	<div class="col-sm-4 col-sm-offset-8">
                			<button id="updateClose" type="button" class=" btn-default" data-dismiss="modal">关闭</button>
                			<button type="submit" class=" btn-primary" id="btn_cancel" onclick="alert('取消成功!')">取消预约</button>
            			</div>
            		</div> 
                    
                    
                   </form>

        </div>
    </div>
</div>
</div>
<script>
	$(document).ready(function(){
		$("#show_back").click(function(){
			window.location.href="index";
		});
	});
</script>
</body>
</html>
