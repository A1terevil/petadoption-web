<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>用户管理</title>
    <!-- 引入css样式文件 -->
    <!-- Bootstrap Core CSS -->
    <link href="/static/css/admin/bootstrap.min.css" rel="stylesheet">
    <!-- MetisMenu CSS -->
    <link href="/static/css/admin/metisMenu.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="/static/css/admin/dataTables.bootstrap.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/static/css/admin/sb-admin-2.css" rel="stylesheet">
    <!-- Custom Fonts -->
    <link href="/static/css/admin/font-awesome.min.css" rel="stylesheet" type="text/css">
    <link href="/static/css/admin/boot-crm.css" rel="stylesheet" type="text/css">
    <style>
        .panel-heading {
            background-color: #337ab7;
            border-color: #2e6da4;
            font-size: 14px;
            padding-left: 20px;
            height: 36px;
            line-height: 36px;
            color: white;
            position: relative;
            cursor: pointer;
        }

        /*转成手形图标*/
        .panel-heading span {
            position: absolute;
            right: 10px;
            top: 12px;
        }
    </style>
</head>
<body>
<div id="wrapper">
    <!-- 导航栏部分 -->
    <nav class="navbar navbar-default navbar-static-top" role="navigation" style="margin-bottom: 0">
        <div class="navbar-header">
            <a class="navbar-brand" href="">宠物领养管理系统</a>
        </div>
        <!-- 导航栏右侧图标部分 -->
        <!-- 导航栏右侧图标部分 -->
        <ul class="nav navbar-top-links navbar-right">
            <!-- 消息通知 end -->
            <!-- 用户信息和系统设置 start -->
            <li class="dropdown">
                <a class="dropdown-toggle" data-toggle="dropdown" href="crmclass/list.action#">
                    <i class="fa fa-user fa-fw"></i>
                    <i class="fa fa-caret-down"></i>
                </a>
                <ul class="dropdown-menu dropdown-user ">
                    <li>
                        <a th:href="@{/index}">
                            <i class="fa fa-sign-out fa-fw"></i>退出登录
                        </a>
                    </li>
                </ul>
            </li>
            <!-- 用户信息和系统设置结束 -->
        </ul> <!-- 左侧显示列表部分 start-->
        <div class="navbar-default sidebar" role="navigation">
            <div class="sidebar-nav navbar-collapse">
                <!-- 教学管理  折叠的分组列表 -->
                <div class="panel-heading" id="collapseListGroupHeading3" data-toggle="collapse"
                     data-target="#collapseListGroup3" role="tab">
                    <h4 class="panel-title">
                        后台管理 <span class="fa fa-chevron-up right"></span>
                    </h4>
                </div>
                <div id="collapseListGroup3" class="panel-collapse collapse in" role="tabpanel"
                     aria-labelledby="collapseListGroupHeading3">
                    <ul class="list-group">
                        <li class="list-group-item my_font">
                            <a th:href="@{/user/client}">
                                <i class="fa fa-flash fa-fw"></i> 用户信息
                            </a>
                        </li>
                        <li class="list-group-item my_font">
                            <a th:href="@{/user/pet}">
                                <i class="fa fa-sitemap fa-fw"></i> 宠物管理
                            </a>
                        </li>
						<li class="list-group-item my_font">
						    <a th:href="@{/user/admin_control}">
						        <i class="fa fa-flash fa-fw"></i> 工作人员管理
						    </a>
						</li>
                    </ul>
                </div>
            </div>
        </div><!-- 左侧显示列表部分 end-->

    </nav>
    <!-- 班级列表查询部分  start-->
    <div id="page-wrapper">
        <div class="row">
            <div class="col-lg-12">
                <h1 class="page-header">用户管理</h1>
            </div>
            <!-- /.col-lg-12 -->
        </div>
        <!-- /.row -->
        <div class="panel panel-default">
            <!-- 搜索部分 -->
            <div class="panel-body">
                <form class="form-inline" method="post" action="cquery" th:object="${cli}">
                    <div class="form-group">
                        <label for="fingByName">用户姓名</label>
                        <input type="text" class="form-control" id="fingByName" placeholder="姓名" name="cname">
                        <label for="fingByTel">用户电话</label>
                        <input type="text" class="form-control" id="fingByTel" placeholder="电话" name="tel">
                    </div>
                    <input type="submit" class="btn btn-primary form-control" id="user_select" value="查询">
                </form>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-12">
                <div class="panel panel-default">
                    <div class="panel-heading">用户信息列表</div>
                    <!-- /.panel-heading -->
                    <table class="table table-bordered table-striped">
                        <thead>
                        <tr>
                            <th>序号</th>
	        				<th>姓名</th>
	        				<th>性别</th>
	        				<th>年龄</th>
	        				<th>电话</th>
	        				<th>地址</th>
	        				<th>是否有领养经验</th>
	        				<th>到达日期</th>
	        				<th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="tbody">
                         <tr th:each="cli,status: ${list}">
	        				<td th:text="${cli.cid}">1</td>
	        				<td th:text="${cli.cname}">1</td>
	        
	        				<td th:if='${cli.csex}==M'>男</td>
	      				    <td th:unless="${cli.csex}==M">女</td>
	        
	      				    <td th:text="${cli.cage}">1</td>
	        				<td th:text="${cli.tel}">1</td>
	        				<td th:text="${cli.addr}">1</td>
	        				<td th:text="${cli.exp}">1</td>
	        				<td th:text="${cli.artime}">1</td>    
 	        				<td>
 	        				
 	        					<a href="crmclass/list.action#" class="btn btn-primary editBtn" data-toggle="modal" data-target="#editClient"
								th:attr="data-cid=${cli.cid}, data-cname=${cli.cname},data-cage=${cli.cage},data-tel=${cli.tel},data-addr=${cli.addr},data-artime=${cli.artime}">修改</a>	        				
     	        				<a th:href="@{/client/cdelete(cname=${cli.cname},tel=${cli.tel})}" th:onclick="'return confirm(\'Are you sure you want to delete this item?\');'"  >删除</a>
	        			   </td> 
	        			  </tr>	                                         
                        </tbody>
                    </table>
<!--                                   <div class="col-md-12 text-right">
                                        <nav aria-label="Page navigation example">
                                               <ul class="pagination">
                                                   分页按钮将通过jQuery动态生成
                                               </ul>
                                   </div> -->
                    <!-- /.panel-body -->
                </div>
                <!-- /.panel -->
            </div>
            <!-- /.col-lg-12 -->
        </div>
    </div>
    <!-- 用户查询  end-->
</div>


<!-- 修改信息模态框 -->
<div class="modal fade" id="editClient" tabindex="-1" role="dialog" aria-labelledby="myModalLabe">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">×</span>
                </button>
                <h4 class="modal-title" id="myModalLabe">修改管理员信息</h4>
            </div>
            <div class="modal-body">
                <form class="form-horizontal" id="edit_client_form" action="client/cupdate" method="post" th:object="${cli}">
                    <input type="hidden" id="edit_cid" name="cid" th:value="${cid}">
                    <div class="form-group">
                        <label for="edit_cname" class="col-sm-2 control-label">
                            姓名
                        </label>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" id="edit_cname"
                                   name="cname" th:value="${cname}">
                        </div>
                        
                        <label for="edit_csex" class="col-sm-2 control-label">
                            性别
                        </label>
                        <div class="col-sm-4">
                            <select class="form-control" id="edit_csex" name="csex">
                                <option th:value="M">男</option>
                                <option th:value="F">女</option>
                            </select>
                        </div>
                        
                    </div>
                    <div class="form-group">          
                        <label for="edit_cage" class="col-sm-2 control-label">
                            年龄
                        </label>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" id="edit_cage"
                                   name="cage" th:value="${cage}">
                        </div>
                        
                        <label for="edit_tel" class="col-sm-2 control-label">
                            电话
                        </label>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" id="edit_tel"
                                   name="tel" th:value="${tel}">
                        </div>
                    </div> 
                    <div class="form-group">          
                        <label for="edit_addr" class="col-sm-2 control-label">
                            地址
                        </label>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" id="edit_addr"
                                   name="addr" th:value="${addr}">
                        </div>
                        
                        <label for="edit_exp" class="col-sm-2 control-label">
                            是否有领养经验
                        </label>
                        <div class="col-sm-4">
                            <select class="form-control" id="edit_exp" name="exp">
                                <option th:value="是">是</option>
                                <option th:value="否">否</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">          
                        <label for="edit_artime" class="col-sm-2 control-label">
                            到达时间
                        </label>
                        <div class="col-sm-4">
                            <input type="date" class="form-control" id="edit_artime"
                                   name="artime" th:value="${artime}">
                        </div>

                    </div>
                    
                                      
                    <div class="form-group">
                    	<div class="col-sm-4 col-sm-offset-8">
                			<button id="update-close" type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                			<button id="update" type="submit" class="btn btn-primary">保存修改</button>
            			</div>
            		</div>                                        
                </form>
            </div>            
        </div>
    </div>
</div>




<!-- 引入js文件 -->
<!-- jQuery -->
<script src="/static/js/admin/jquery-1.11.3.min.js"></script>

<script src="/static/js/admin/bootstrap.min.js"></script>

<script src="/static/js/admin/jquery.dataTables.min.js"></script>

<script src="/static/js/admin/sb-admin-2.js"></script>
<script src="/static/js/admin/admin.js"></script>

</body>
</html>
