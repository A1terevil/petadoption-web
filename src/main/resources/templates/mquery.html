    <!-- 班级列表查询部分  start-->
    <div id="page-wrapper">
        <div class="row">
            <div class="col-lg-12">
                <h1 class="page-header">工作人员管理</h1>
            </div>
            <!-- /.col-lg-12 -->
        </div>
        
        
        
        <!-- /.row -->
        <div class="panel panel-default">
            <!-- 搜索部分 -->
            <div class="panel-body">
                <form class="form-inline" method="post" action="mquery" th:object="${man}">
                    <div class="form-group">
                        <label for="fingByName">工作人员姓名</label>
                        <input type="text" class="form-control" id="fingByName" placeholder="姓名" name="mname">
                    </div>
                    <input  type="submit" class="btn btn-primary form-control" id="manager_select" value="查询">
                </form>
            </div>
        </div>
        
     
     
        
		<a href="crmclass/list.action#" class="btn btn-primary" data-toggle="modal" data-target="#adminModal"
		>新建</a>
				
		<div class="modal fade" id="adminModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<button type="button" class="close" data-dismiss="modal" aria-hidden="true">
							&times;
						</button>
						<h4 class="modal-title" id="myModalLabel">
							管理员信息
						</h4>
					</div>
																														
					<div class="modal-body">
						<form class="form-horizontal" id="new_manager_form" action="admin_control/mdo-add" method="post" th:object="${man}">
						    <div class="form-group">                      		
                        		 <label for="new_adminName" class="col-sm-2 control-label" id="manager">
						            姓名
						        </label>
						        <div class="col-sm-4">
						            <input type="text" class="form-control" id="new_adminName" placeholder="姓名"
						                   name="mname">
						        </div>
						        <label for="new_adminAddr" class="col-sm-2 control-label">
								    账号
								</label>
								<div class="col-sm-4">
								    <input type="text" class="form-control" id="new_adminAddr" placeholder="账号"
								           name="macc">
								</div>						        
                        	</div>
                        	
                        	<div class="form-group">                      																									
								<label for="new_adminPwd" class="col-sm-2 control-label">
								    密码
								</label>
								<div class="col-sm-4">
								    <input type="text" class="form-control" id="new_adminPwd" placeholder="密码"
								           name="mpwd">
								</div>								
							</div>
							
							<div class="form-group">
								<div class="col-sm-4 col-sm-offset-8">
									<button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
									<input type="submit" class="btn btn-primary" value="创建" id="creat_manager">
								</div>
							</div>							
						</form>
					</div>					
				</div><!-- /.modal-content -->
			</div><!-- /.modal -->
		</div>
		
		
		
		
        <div class="row">
            <div class="col-lg-12">
                <div class="panel panel-default">
                    <div class="panel-heading">工作人员信息列表</div>
                    <!-- /.panel-heading -->
                    <table class="table table-bordered table-striped">
                        <thead>
						    <tr>
						        <th>序号</th>
					            <th>姓名</th>
						        <th>账号</th>
						        <th>密码</th>
						        <th>操作</th>
						    </tr>
                        </thead>
                        <tbody id="tbody">
						    <tr>
						        <td th:text="${man.mid}">1</td>
						        <td th:text="${man.mname}">1</td>
						        <td th:text="${man.macc}">1</td>
						        <td th:text="${man.mpwd}">1</td>
					
					  	        <td>					  	        
					  	        	<a href="crmclass/list.action#" class="btn btn-primary editBtn" data-toggle="modal" data-target="#editManager"
									th:attr="data-mid=${man.mid}, data-mname=${man.mname}, data-macc=${man.macc},data-mpwd=${man.mpwd}">修改</a>
					     	        
					     	        <a th:href="@{/manager/mdelete(mid=${man.mid})}" th:onclick="'return confirm(\'Are you sure you want to delete this item?\');'"  >删除</a>
						    </tr>
                        </tbody>
                    </table>
                    <!-- /.panel-body -->
                </div>
                <!-- /.panel -->
            </div>
            <!-- /.col-lg-12 -->
        </div>
    </div>
    <!-- 用户查询  end-->
</div>




<!-- 修改信息模态框 -->
<div class="modal fade" id="editManager" tabindex="-1" role="dialog" aria-labelledby="myModalLabe">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">×</span>
                </button>
                <h4 class="modal-title" id="myModalLabe">修改管理员信息</h4>
            </div>
            <div class="modal-body">
                <form class="form-horizontal" id="edit_manager_form" action="admin_control/mupdate" method="post" th:object="${man}">
                    <input type="hidden" id="edit_mid" name="mid" th:value="${mid}">
                    <div class="form-group">
                        <label for="edit_mname" class="col-sm-2 control-label">
                            姓名
                        </label>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" id="edit_mname"
                                   name="mname" th:value="${mname}">
                        </div>
                        <label for="edit_macc" class="col-sm-2 control-label">
                            账号
                        </label>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" id="edit_macc"
                                   name="macc" th:value="${macc}">
                        </div>
                    </div>
                    <div class="form-group">          
                        <label for="edit_mpwd" class="col-sm-2 control-label">
                            密码
                        </label>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" id="edit_mpwd"
                                   name="mpwd" th:value="${mpwd}">
                        </div>
                    </div>                   
                    <div class="form-group">
                    	<div class="col-sm-4 col-sm-offset-8">
                			<button id="update-close" type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                			<button id="update" type="submit" class="btn btn-primary">保存修改</button>
            			</div>
            		</div>                                        
                </form>
            </div>            
        </div>
    </div>
</div>
